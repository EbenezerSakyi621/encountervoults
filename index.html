<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Reminder</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    color:#fff;
    text-align:center;
    padding:20px;
}

.container{
    max-width:900px;
    width:100%;
}

h1{
    font-size:3rem;
    margin-bottom:20px;
    color:#ff4d4d;
    text-transform:uppercase;
    letter-spacing:2px;
}

.message{
    font-size:1.3rem;
    line-height:1.7;
    margin-bottom:40px;
    color:#e5e7eb;
}

.highlight{
    color:#fbbf24;
    font-weight:bold;
}

.countdown{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.box{
    width:150px;
    height:150px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.box span:first-child{
    font-size:3rem;
    font-weight:bold;
    color:#fbbf24;
}

.label{
    font-size:1rem;
    text-transform:uppercase;
    margin-top:10px;
    color:#cbd5e1;
}

.expired{
    font-size:2rem;
    color:#ff4d4d;
    font-weight:bold;
    margin-top:30px;
}
</style>
</head>
<body>

<div class="container">

    <h1>⚠ Payment Reminder</h1>

    <p class="message">
        Hey! <span class="highlight">Encounter Volts</span>, your website subscription/payment is currently overdue.
        Please make payment within the next 7 days to avoid suspension or permanent loss of website access.
    </p>

    <div class="countdown">
        <div class="box">
            <span id="days">00</span>
            <span class="label">Days</span>
        </div>

        <div class="box">
            <span id="hours">00</span>
            <span class="label">Hours</span>
        </div>

        <div class="box">
            <span id="minutes">00</span>
            <span class="label">Minutes</span>
        </div>

        <div class="box">
            <span id="seconds">00</span>
            <span class="label">Seconds</span>
        </div>
    </div>

    <div id="expired"></div>

</div>


<script>
let deadline;

// Check if deadline already exists
if (localStorage.getItem("countdownDeadline")) {
    deadline = parseInt(localStorage.getItem("countdownDeadline"));
} else {
    // Set new deadline only once (5 days from first visit)
    deadline = new Date().getTime() + (5 * 24 * 60 * 60 * 1000);
    localStorage.setItem("countdownDeadline", deadline);
}

const timer = setInterval(() => {

    const now = new Date().getTime();
    const distance = deadline - now;

    if (distance < 0) {
        clearInterval(timer);

        document.querySelector('.countdown').style.display = 'none';

        document.getElementById('expired').innerHTML =
            '<div class="expired">⛔ Website Access Expired!</div>';

        // optional: remove stored deadline
        localStorage.removeItem("countdownDeadline");

        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById('days').innerHTML = days;
    document.getElementById('hours').innerHTML = hours;
    document.getElementById('minutes').innerHTML = minutes;
    document.getElementById('seconds').innerHTML = seconds;

}, 1000);
</script>

</body>
</html>
